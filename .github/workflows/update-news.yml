name: Update AI News JSON

on:
  schedule:
    - cron: '0 */12 * * *' # Run every 12 hours
  workflow_dispatch: # Allow manual trigger

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run script
        run: python scripts/update_news.py

      - name: Send Email Notification
        if: hashFiles('email_summary.html') != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: Nuevas Noticias de IA en tu Portfolio 🤖
          to: ${{ secrets.MAIL_TO }}
          from: Portfolio Bot
          html_body: file://email_summary.html

      - name: Send WhatsApp Notification
        if: hashFiles('whatsapp_summary.txt') != ''
        run: |
          TEXT=$(cat whatsapp_summary.txt)
          curl -s -X GET "https://api.callmebot.com/whatsapp.php?phone=${{ secrets.WHATSAPP_PHONE }}&text=${TEXT}&apikey=${{ secrets.WHATSAPP_API_KEY }}"

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/ai-news.js
          git commit -m "chore(data): auto-update AI news feed" || echo "No changes to commit"
          git pull --rebase origin main
          git push
